<svg x="0" y="0" viewBox="0 0 100 100"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">

  <style>
    .moon {
      animation: float 4s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes float {
      0%,100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-1.8px);
      }
    }
  </style>

  <defs>
    <linearGradient id="moon-grad" x1="0%" y1="50%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#686e73"/>
      <stop offset="100%" stop-color="#6a7075"/>
    </linearGradient>
  </defs>

  <g transform="translate(20 20)">
    <animateTransform
        attributeName="transform"
        type="translate"
        values="20 20;20 18;20 20"
        dur="4s"
        repeatCount="indefinite"/>
        
    <path
        d="M28.43,0A28.44,28.44,0,0,1,32.3,14.32,28.61,28.61,0,0,1,3.69,42.93,28.71,28.71,0,0,1,0,42.66,28.59,28.59,0,1,0,28.43,0Z"
        fill="url(#moon-grad)"
    />
  </g>

</svg>